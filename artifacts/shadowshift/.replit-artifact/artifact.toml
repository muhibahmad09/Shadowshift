kind = "web"
previewPath = "/"
title = "ShadowShift"
version = "1.0.0"
id = "artifacts/shadowshift"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20299

[services.development]
run = "pnpm --filter @workspace/shadowshift run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadowshift", "run", "build" ]
serve = "static"
publicDir = "artifacts/shadowshift/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20299"
BASE_PATH = "/"
