<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ShadowShift</title>
    <meta name="description" content="ShadowShift — a shadow-shifting arcade game." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="ShadowShift" />
    <meta property="og:description" content="ShadowShift — a shadow-shifting arcade game." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShadowShift" />
    <meta name="twitter:description" content="ShadowShift — a shadow-shifting arcade game." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div id="hud-brand">
        <span id="hud-title">SHADOWSHIFT</span>
        <span id="hud-world">LIGHT WORLD</span>
      </div>

      <div id="hud-stats">
        <div class="stat-card stat-score">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="hud-score">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Distance</span>
          <span class="stat-value" id="hud-distance">0 m</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Coins</span>
          <span class="stat-value" id="hud-coins">0</span>
        </div>
        <div class="stat-card stat-best" id="hud-best-card">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="hud-best">0</span>
        </div>
      </div>
    </div>

    <button id="switch-world-btn" type="button" aria-label="Switch world (W)">
      <span class="switch-world-ring"></span>
      <span class="switch-world-label">SWITCH<br />WORLD</span>
    </button>

    <button id="pause-btn" type="button" aria-label="Pause (Esc)">
      <span class="pause-icon"></span>
    </button>

    <div id="main-menu">
      <div class="menu-logo">
        <span class="menu-logo-text">SHADOWSHIFT</span>
        <span class="menu-tagline">Slip between light and shadow</span>
      </div>

      <div class="menu-highscore">
        <span class="menu-highscore-label">High Score</span>
        <span class="menu-highscore-value" id="menu-highscore">0</span>
      </div>

      <nav class="menu-actions">
        <button type="button" class="menu-btn menu-btn-primary" id="menu-play-btn">Play</button>
        <button type="button" class="menu-btn" id="menu-multiplayer-btn">Multiplayer</button>
        <button type="button" class="menu-btn" id="menu-settings-btn">Settings</button>
        <button type="button" class="menu-btn menu-btn-danger" id="menu-exit-btn">Exit</button>
      </nav>
    </div>

    <div id="pause-menu">
      <div class="pause-card">
        <h2 class="pause-title">Paused</h2>
        <nav class="pause-actions">
          <button type="button" class="menu-btn menu-btn-primary" id="pause-resume-btn">Resume</button>
          <button type="button" class="menu-btn" id="pause-restart-btn">Restart</button>
          <button type="button" class="menu-btn" id="pause-settings-btn">Settings</button>
          <button type="button" class="menu-btn menu-btn-danger" id="pause-mainmenu-btn">Main Menu</button>
        </nav>
      </div>
    </div>

    <div id="modal-overlay">
      <div class="modal-panel">
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-body" id="modal-body"></p>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>

    <div id="settings-panel">
      <div class="settings-card">
        <div class="settings-header">
          <h2 class="settings-title">Settings</h2>
          <button type="button" class="settings-close" id="settings-close-btn" aria-label="Close settings">&times;</button>
        </div>

        <div class="settings-row">
          <span class="settings-label">Music</span>
          <button type="button" class="toggle-switch" id="toggle-music" role="switch" aria-checked="true">
            <span class="toggle-knob"></span>
          </button>
        </div>

        <div class="settings-row">
          <span class="settings-label">Sound</span>
          <button type="button" class="toggle-switch" id="toggle-sound" role="switch" aria-checked="true">
            <span class="toggle-knob"></span>
          </button>
        </div>

        <div class="settings-row">
          <span class="settings-label">Vibration</span>
          <button type="button" class="toggle-switch" id="toggle-vibration" role="switch" aria-checked="true">
            <span class="toggle-knob"></span>
          </button>
        </div>

        <div class="settings-row settings-row-column">
          <span class="settings-label">Graphics Quality</span>
          <div class="quality-options" id="quality-options">
            <button type="button" class="quality-btn" data-quality="low">Low</button>
            <button type="button" class="quality-btn" data-quality="medium">Medium</button>
            <button type="button" class="quality-btn" data-quality="high">High</button>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-label">FPS</span>
          <span class="settings-fps" id="settings-fps">0</span>
        </div>

        <div class="settings-divider"></div>

        <div class="settings-row settings-row-column">
          <button type="button" class="danger-btn" id="reset-save-btn">Reset Save Data</button>
          <p class="settings-hint" id="reset-hint">Clears your saved high score. This can't be undone.</p>
        </div>
      </div>
    </div>

    <script type="module" src="/game.js"></script>
  </body>
</html>
