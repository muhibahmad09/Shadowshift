<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ShadowShift</title>
    <meta name="description" content="ShadowShift — a shadow-shifting arcade game." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="ShadowShift" />
    <meta property="og:description" content="ShadowShift — a shadow-shifting arcade game." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShadowShift" />
    <meta name="twitter:description" content="ShadowShift — a shadow-shifting arcade game." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div id="hud-brand">
        <span id="hud-title">SHADOWSHIFT</span>
        <span id="hud-world">LIGHT WORLD</span>
      </div>

      <div id="hud-stats">
        <div class="stat-card stat-score">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="hud-score">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Distance</span>
          <span class="stat-value" id="hud-distance">0 m</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Coins</span>
          <span class="stat-value" id="hud-coins">0</span>
        </div>
        <div class="stat-card stat-best" id="hud-best-card">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="hud-best">0</span>
        </div>
      </div>
    </div>

    <button id="switch-world-btn" type="button" aria-label="Switch world (W)">
      <span class="switch-world-ring"></span>
      <span class="switch-world-label">SWITCH<br />WORLD</span>
    </button>

    <script type="module" src="/game.js"></script>
  </body>
</html>
